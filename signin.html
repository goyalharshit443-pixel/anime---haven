<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Haven</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' stroke='url(%23logoGrad)' stroke-width='2' fill='none'/%3E%3Cpath d='M20 8 L26 16 L20 13 L14 16 Z' fill='url(%23logoGrad)'/%3E%3Cpath d='M12 18 Q20 30 28 18' stroke='url(%23logoGrad)' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='15' cy='20' r='2' fill='url(%23logoGrad)'/%3E%3Ccircle cx='25' cy='20' r='2' fill='url(%23logoGrad)'/%3E%3Cdefs%3E%3ClinearGradient id='logoGrad' x1='0' y1='0' x2='40' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23e94560'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .signin-bg-real {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('images/img1.jpg');
      background-size: cover; background-position: center;
      filter: brightness(0.25) saturate(0.8);
    }
    .form-error {
      background: rgba(233,69,96,0.15);
      border: 1px solid rgba(233,69,96,0.3);
      color: #ff6b81;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .form-error.show { display: block; }
    .form-success {
      background: rgba(74,222,128,0.15);
      border: 1px solid rgba(74,222,128,0.3);
      color: #4ade80;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      animation: fadeUp 0.3s ease;
    }
    .form-success.show { display: block; }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<header id="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="18" stroke="url(#logoGrad)" stroke-width="2"/>
        <path d="M20 8 L26 16 L20 13 L14 16 Z" fill="url(#logoGrad)"/>
        <path d="M12 18 Q20 30 28 18" stroke="url(#logoGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="15" cy="20" r="2" fill="url(#logoGrad)"/>
        <circle cx="25" cy="20" r="2" fill="url(#logoGrad)"/>
        <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
      </svg>
      <span class="logo-text">Anime<span class="logo-accent">Haven</span></span>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="shonen.html" class="nav-link" data-genre="shonen">Shonen</a>
      <a href="shojo.html" class="nav-link" data-genre="shojo">Shojo</a>
      <a href="seinen.html" class="nav-link" data-genre="seinen">Seinen</a>
      <a href="josei.html" class="nav-link" data-genre="josei">Josei</a>
      <a href="kodomomuke.html" class="nav-link" data-genre="kodomomuke">Kodomomuke</a>
    </nav>
    <div class="header-actions">
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
  <div class="mobile-nav" id="mobile-nav">
    <a href="index.html">Home</a><a href="shonen.html">Shonen</a><a href="shojo.html">Shojo</a><a href="seinen.html">Seinen</a><a href="josei.html">Josei</a><a href="kodomomuke.html">Kodomomuke</a>
  </div>
</header>

<main class="signin-page">
  <div class="signin-bg-real"></div>
  <div class="signin-bg"></div>
  <!-- Decorative floating shapes -->
  <div style="position:fixed; inset:0; pointer-events:none; z-index:0;">
    <div style="position:absolute; width:300px; height:300px; border-radius:50%; background: radial-gradient(circle, rgba(233,69,96,0.12), transparent); top:20%; left:5%; filter:blur(40px); animation: shapeFloat 8s ease-in-out infinite alternate;"></div>
    <div style="position:absolute; width:250px; height:250px; border-radius:50%; background: radial-gradient(circle, rgba(168,85,247,0.1), transparent); bottom:15%; right:8%; filter:blur(40px); animation: shapeFloat 10s ease-in-out infinite alternate-reverse;"></div>
  </div>

  <div class="signin-card">
    <!-- Logo -->
    <div class="signin-header">
      <a href="index.html" class="logo" style="justify-content:center; margin-bottom:1rem;">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:44px;height:44px">
          <circle cx="20" cy="20" r="18" stroke="url(#signinLogoGrad)" stroke-width="2"/>
          <path d="M20 8 L26 16 L20 13 L14 16 Z" fill="url(#signinLogoGrad)"/>
          <path d="M12 18 Q20 30 28 18" stroke="url(#signinLogoGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="15" cy="20" r="2" fill="url(#signinLogoGrad)"/>
          <circle cx="25" cy="20" r="2" fill="url(#signinLogoGrad)"/>
          <defs><linearGradient id="signinLogoGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
        </svg>
        <span class="logo-text" style="font-size:2rem">Anime<span class="logo-accent">Haven</span></span>
      </a>
      <h1 class="signin-title" id="form-title">Welcome Back</h1>
      <p class="signin-sub" id="form-subtitle">Sign in to your account</p>
    </div>

    <!-- Error / Success messages -->
    <div class="form-error" id="form-error"></div>
    <div class="form-success" id="form-success"></div>

    <!-- Social Logins -->
    <div class="social-logins" style="justify-content: center; flex-direction: column; align-items: center; gap: 1rem;">
      <div id="g_id_onload"
           data-client_id="YOUR_GOOGLE_CLIENT_ID"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleGoogleCallback"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="filled_black"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"
           data-width="250">
      </div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or continue with email</span>
      <div class="divider-line"></div>
    </div>

    <form id="signin-form">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input type="email" id="email" class="form-input" placeholder="you@email.com" required />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="6" />
        <a href="#" class="form-forgot">Forgot password?</a>
      </div>
      <button type="submit" class="btn-submit" id="submit-btn">Sign In</button>
    </form>

    <div class="form-toggle">
      <span id="toggle-text">New to Anime Haven? </span>
      <span id="toggle-mode"><span id="toggle-span-text">Create account</span></span>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script src="main.js"></script>
<script>
  const API_BASE = window.API_BASE_URL || '';
  const GOOGLE_CLIENT_ID = window.GOOGLE_CLIENT_ID || 'YOUR_GOOGLE_CLIENT_ID';
  const googleOnload = document.getElementById('g_id_onload');
  if (googleOnload) googleOnload.dataset.client_id = GOOGLE_CLIENT_ID;

  // ---- Backend Auth Integration ----
  const signinForm = document.getElementById('signin-form');
  const toggleLink = document.getElementById('toggle-mode');
  const formTitle = document.getElementById('form-title');
  const formSubTitle = document.getElementById('form-subtitle');
  const submitBtn = document.getElementById('submit-btn');
  const formError = document.getElementById('form-error');
  const formSuccess = document.getElementById('form-success');
  let isSignUp = false;

  function showFormError(msg) {
    formError.textContent = msg;
    formError.classList.add('show');
    formSuccess.classList.remove('show');
  }
  function showFormSuccess(msg) {
    formSuccess.textContent = msg;
    formSuccess.classList.add('show');
    formError.classList.remove('show');
  }
  function clearMessages() {
    formError.classList.remove('show');
    formSuccess.classList.remove('show');
  }

  if (toggleLink) {
    toggleLink.addEventListener('click', () => {
      isSignUp = !isSignUp;
      clearMessages();
      if (formTitle) formTitle.textContent = isSignUp ? 'Create Account' : 'Welcome Back';
      if (formSubTitle) formSubTitle.textContent = isSignUp ? 'Join the Anime Haven community' : 'Sign in to your account';
      if (submitBtn) submitBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
      const toggleText = document.getElementById('toggle-text');
      const toggleSpanText = document.getElementById('toggle-span-text');
      if (toggleText) toggleText.textContent = isSignUp ? 'Already have an account? ' : 'New to Anime Haven? ';
      if (toggleSpanText) toggleSpanText.textContent = isSignUp ? 'Sign In' : 'Create account';
    });
  }

  if (signinForm) {
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const endpoint = isSignUp ? `${API_BASE}/api/auth/signup` : `${API_BASE}/api/auth/signin`;

      submitBtn.textContent = isSignUp ? 'Creating Account...' : 'Signing In...';
      submitBtn.disabled = true;

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showFormError(data.error || 'Something went wrong.');
          submitBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
          submitBtn.disabled = false;
          return;
        }

        // Save token to localStorage
        localStorage.setItem('authToken', data.token);
        localStorage.setItem('userEmail', data.user.email);
        localStorage.setItem('userId', data.user.id);

        showFormSuccess(data.message);
        showToast(isSignUp ? '🎉 Account created! Welcome!' : '👋 Welcome back!');

        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1200);

      } catch (err) {
        showFormError('Could not connect to server. Please try again.');
        submitBtn.textContent = isSignUp ? 'Create Account' : 'Sign In';
        submitBtn.disabled = false;
      }
    });
  }

  // Google Sign-In Callback
  async function handleGoogleCallback(response) {
    try {
      showToast('Verifying Google Sign-In...');
      const res = await fetch(`${API_BASE}/api/auth/google`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      const data = await res.json();
      
      if (!res.ok) {
        showFormError(data.error || 'Google Sign-In failed.');
        return;
      }
      
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('userEmail', data.user.email);
      localStorage.setItem('userId', data.user.id);
      localStorage.setItem('userRole', data.user.role || 'normal');
      
      showFormSuccess(data.message);
      showToast('🎉 Google Sign-In successful!');
      setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    } catch (e) {
      showFormError('Could not connect to server.');
    }
  }

  // If already logged in, redirect to home
  if (localStorage.getItem('authToken')) {
    fetch(`${API_BASE}/api/auth/me`, {
      headers: { 'Authorization': 'Bearer ' + localStorage.getItem('authToken') }
    }).then(res => {
      if (res.ok) {
        showToast('You are already signed in!');
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
      }
    }).catch(() => {});
  }
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
