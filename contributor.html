<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Haven</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' stroke='url(%23logoGrad)' stroke-width='2' fill='none'/%3E%3Cpath d='M20 8 L26 16 L20 13 L14 16 Z' fill='url(%23logoGrad)'/%3E%3Cpath d='M12 18 Q20 30 28 18' stroke='url(%23logoGrad)' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='15' cy='20' r='2' fill='url(%23logoGrad)'/%3E%3Ccircle cx='25' cy='20' r='2' fill='url(%23logoGrad)'/%3E%3Cdefs%3E%3ClinearGradient id='logoGrad' x1='0' y1='0' x2='40' y2='40' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0%25' stop-color='%23e94560'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .contributor-bg {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
    }
    .dashboard-container {
      max-width: 800px;
      margin: 100px auto 40px;
      padding: 2rem;
      background: rgba(26,26,46,0.8);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .dash-title {
      font-size: 2.5rem;
      font-family: 'Bebas Neue', cursive;
      color: var(--accent-light);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .dash-sub {
      text-align: center;
      color: rgba(255,255,255,0.6);
      margin-bottom: 2rem;
    }
    
    .anime-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    .form-group.full-width {
      grid-column: 1 / -1;
    }
    .form-label {
      display: block; margin-bottom: 0.5rem; font-weight: 600; color: #fff;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 1rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    .form-select option {
      background: #1a1a2e;
      color: #fff;
    }
    .form-input:focus, .form-select:focus {
      outline: none;
      border-color: var(--primary-accent);
      background: rgba(255,255,255,0.1);
    }
    .btn-submit {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
      color: white;
      border: none;
      padding: 1.2rem;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.3s;
      margin-top: 1rem;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="contributor-bg"></div>

<!-- Replace with existing header inclusion from main js or copy basic one -->
<header id="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">
      <span class="logo-text">Anime<span class="logo-accent">Haven</span></span>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Home</a>
    </nav>
    <div class="header-actions">
      <button class="btn btn-outline" id="signout-btn">Sign Out</button>
    </div>
  </div>
</header>

<main>
  <div class="dashboard-container">
    <h1 class="dash-title">Contributor Dashboard</h1>
    <p class="dash-sub">Add new anime listings directly to the specific categories.</p>

    <div class="toast" id="toast"></div>

    <form class="anime-form" id="add-anime-form">
      <div class="form-group full-width">
        <label class="form-label" for="category">Category (Table)</label>
        <select id="category" class="form-select" required>
          <option value="shonen">Shonen</option>
          <option value="shojo">Shojo</option>
          <option value="seinen">Seinen</option>
          <option value="josei">Josei</option>
          <option value="kodomomuke">Kodomomuke</option>
        </select>
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="title">Title</label>
        <input type="text" id="title" class="form-input" placeholder="e.g. Attack on Titan" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="author">Author</label>
        <input type="text" id="author" class="form-input" placeholder="Originator/Studio" />
      </div>

      <div class="form-group">
        <label class="form-label" for="tags">Tags (comma separated)</label>
        <input type="text" id="tags" class="form-input" placeholder="Action, Adventure, Dark Fantasy" />
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="photo_url">Photo URL</label>
        <input type="url" id="photo_url" class="form-input" placeholder="https://example.com/image.jpg" />
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="video_url">Video URL / Embed URL</label>
        <input type="url" id="video_url" class="form-input" placeholder="https://youtube.com/embed/..." />
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Add Anime to Database</button>
    </form>
  </div>
</main>

<script src="main.js"></script>
<script>
  // Auth Check
  const token = localStorage.getItem('authToken');
  const role = localStorage.getItem('userRole');

  if (!token) {
    alert("You must be signed in.");
    window.location.href = 'signin.html';
  } else if (role !== 'contributor') {
    alert("Access Denied. You must be a contributor.");
    window.location.href = 'index.html';
  }

  document.getElementById('signout-btn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = 'index.html';
  });

  const form = document.getElementById('add-anime-form');
  const btn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true;
    btn.textContent = 'Adding...';

    const category = document.getElementById('category').value;
    const body = {
      title: document.getElementById('title').value.trim(),
      author: document.getElementById('author').value.trim(),
      tags: document.getElementById('tags').value.trim(),
      photo_url: document.getElementById('photo_url').value.trim(),
      video_url: document.getElementById('video_url').value.trim()
    };

    try {
      const res = await fetch(`/api/animes/${category}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      
      if (res.ok) {
        showToast('✅ ' + data.message);
        form.reset();
      } else {
        alert("Error: " + data.error);
      }
    } catch (err) {
      alert("Network Error.");
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add Anime to Database';
    }
  });

  function showToast(msg) {
    const toast = document.getElementById('toast');
    if (!toast) return;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 3000);
  }
</script>
</body>
</html>
